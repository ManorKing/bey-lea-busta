<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>Bey Lea Busta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* DESIGN TOKENS: Midnight Navy with Neon Turf Green & Gold */
  :root {
    --navy: #0a1628; --navy-mid: #0f2040; --navy-light: #162d55;
    --green: #00d68f; --green-dim: #00a872;
    --gold: #f0c040; --red: #ff4d6d; --blue: #3b82f6;
    --white: #f0f4ff; --muted: #8b9bb4;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--navy);
    color: var(--white);
    display: flex; flex-direction: column;
    height: 100vh;
    overflow: hidden; /* Prevent bouncing on mobile */
  }

  /* --- AUTH SCREEN --- */
  #screen-auth {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 20px;
  }
  .auth-tabs { display: flex; margin-bottom: 20px; background: var(--navy-mid); border-radius: 8px; overflow: hidden; }
  .auth-tab { background: transparent; color: var(--muted); border: none; padding: 10px 20px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: 0.3s; }
  .auth-tab.active { background: var(--green); color: var(--navy); }
  .auth-input { width: 100%; max-width: 300px; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--navy-light); background: var(--navy-mid); color: var(--white); font-size: 16px; }
  .auth-btn { width: 100%; max-width: 300px; padding: 15px; border-radius: 8px; border: none; background: var(--gold); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; }

  /* --- GAME SCREEN --- */
  #screen-game { display: none; flex-direction: column; height: 100%; }
  
  .header-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); }
  .nav-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; padding: 5px 15px; font-weight: bold; }
  
  /* Shot Type Selector Panel */
  .shot-selector { display: flex; justify-content: space-between; padding: 10px; background: var(--navy); }
  .shot-btn { flex: 1; margin: 0 2px; padding: 8px 0; background: var(--navy-mid); color: var(--muted); border: 1px solid var(--navy-light); border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
  .shot-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
  
  /* Map Area */
  #map-container { 
    flex-grow: 1; 
    position: relative; /* Crucial for placing pins accurately */
    display: flex; justify-content: center; align-items: center; 
    background: #000; overflow: hidden; 
  }
  #hole-image { max-width: 100%; max-height: 100%; object-fit: contain; }
  
  /* The visual pin dropped on the map */
  .shot-pin {
    position: absolute;
    width: 12px; height: 12px;
    background-color: var(--red);
    border: 2px solid white;
    border-radius: 50%;
    transform: translate(-50%, -50%); /* Centers pin on tap */
    pointer-events: none;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
  }

  /* Data Display Panel */
  .data-panel { padding: 15px; text-align: center; background: var(--navy-mid); border-top: 1px solid var(--navy-light); }
  .avg-text { font-family: 'DM Mono', monospace; color: var(--green); font-size: 18px; margin-bottom: 10px; }
  .save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--gold); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; }
</style>
</head>
<body>

  <div id="screen-auth">
    <h1 style="font-family: 'Syne', sans-serif; color: var(--green); font-size: 32px; text-align: center; line-height: 1.1;">BEY LEA<br>BUSTA</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">DECADE Strategy Tracker</p>
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">LOGIN</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">SIGN UP</button>
    </div>

    <input type="email" id="field-email" class="auth-input" placeholder="Email Address">
    <input type="password" id="field-pass" class="auth-input" placeholder="Password">
    
    <button id="auth-submit" class="auth-btn" onclick="handleAuth()">LOGIN</button>
  </div>

  <div id="screen-game">
    
    <div class="header-bar">
      <button class="nav-btn" onclick="changeHole(-1)">◀ PREV</button>
      <h2 id="hole-title" style="margin: 0; font-family: 'Syne', sans-serif;">Hole 1</h2>
      <button class="nav-btn" onclick="changeHole(1)">NEXT ▶</button>
    </div>

    <div class="shot-selector" id="shot-selector">
      <button class="shot-btn active" onclick="setShotType('Tee', this)">TEE</button>
      <button class="shot-btn" onclick="setShotType('Approach', this)">APPROACH</button>
      <button class="shot-btn" onclick="setShotType('Chip', this)">CHIP</button>
      <button class="shot-btn" onclick="setShotType('Putt', this)">PUTT</button>
    </div>

    <div id="map-container" onclick="handleMapTap(event)">
      <img id="hole-image" src="./images/Hole1.png" alt="Hole Map" draggable="false">
    </div>

    <div class="data-panel">
      <div id="average-display" class="avg-text">Awaiting Shot Plot...</div>
      <button class="save-btn" onclick="saveHoleData()">FINISH & SAVE HOLE</button>
    </div>
  </div>

  <script>
    // --- 1. SUPABASE INITIALIZATION ---
    // User's specific Bey Lea Busta credentials
    const SUPABASE_URL = 'https://nawebecmrjoyuapwhuaq.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hd2ViZWNtcmpveXVhcHdodWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjY2NjEsImV4cCI6MjA5MDEwMjY2MX0.bKOoBYFDTEw0QYvFmoSuOjcqRioN44OkqgpLfX42sG0';
    
    let sb = null;
    try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } catch (err) {
      console.error("Supabase failed to initialize:", err);
    }

    // --- 2. AUTHENTICATION LOGIC ---
    let authMode = 'login'; 

    function switchAuthTab(mode) {
      authMode = mode;
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', mode === 'login');
      tabs[1].classList.toggle('active', mode === 'signup');
      document.getElementById('auth-submit').textContent = mode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
    }

    async function handleAuth() {
      const email = document.getElementById('field-email').value;
      const pass = document.getElementById('field-pass').value;
      const btn = document.getElementById('auth-submit');
      
      if (!email || !pass) return alert("Please enter email and password.");

      btn.textContent = 'LOADING…';
      btn.disabled = true;

      if (!sb) {
        alert("Database disconnected. Cannot authenticate.");
        btn.disabled = false; return;
      }

      try {
        if (authMode === 'signup') {
          const { error } = await sb.auth.signUp({ email, password: pass });
          if (error) throw error;
          alert("Account Created! You can now log in.");
          switchAuthTab('login');
        } else {
          const { error } = await sb.auth.signInWithPassword({ email, password: pass });
          if (error) throw error;
          
          // Success! Show app and load front 9
          document.getElementById('screen-auth').style.display = 'none';
          document.getElementById('screen-game').style.display = 'flex';
          loadHole(1);
        }
      } catch (err) {
        alert("Auth Error: " + err.message);
      }
      
      btn.textContent = authMode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
      btn.disabled = false;
    }

    // --- 3. COURSE STATE & NAVIGATION ---
    let currentHole = 1;
    const TOTAL_HOLES = 9; // Currently beta testing front 9
    
    // State to hold the shots plotted during the *current* play of this hole
    let currentShots = []; 
    let activeShotType = 'Tee'; // Default shot type

    function loadHole(holeNumber) {
      currentHole = holeNumber;
      document.getElementById('hole-title').textContent = `Hole ${holeNumber}`;
      document.getElementById('hole-image').src = `./images/Hole${holeNumber}.png`;
      
      // Reset hole state
      currentShots = [];
      document.getElementById('average-display').textContent = "Awaiting Shot Plot...";
      
      // Remove visual pins from the map
      document.querySelectorAll('.shot-pin').forEach(pin => pin.remove());
      
      // Reset shot type to Tee
      document.querySelectorAll('.shot-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.shot-btn')[0].classList.add('active');
      activeShotType = 'Tee';
    }

    function changeHole(direction) {
      let newHole = currentHole + direction;
      if (newHole < 1) newHole = 1;
      if (newHole > TOTAL_HOLES) newHole = TOTAL_HOLES;
      if (newHole !== currentHole) loadHole(newHole);
    }

    function setShotType(type, buttonElement) {
      activeShotType = type;
      // Update UI
      document.querySelectorAll('.shot-btn').forEach(btn => btn.classList.remove('active'));
      buttonElement.classList.add('active');
    }

    // --- 4. MAP TAPPING & AVERAGES (THE HEART OF THE APP) ---
    async function handleMapTap(event) {
      const img = document.getElementById('hole-image');
      if (event.target !== img) return; // Ensure they tapped the image itself

      // CALCULATE PERCENTAGES: 
      // We calculate where the user tapped as a % of the image's total width/height.
      // This is critical because an iPhone Mini and an iPad render the image at different sizes.
      const rect = img.getBoundingClientRect();
      const tapX = event.clientX - rect.left;
      const tapY = event.clientY - rect.top;
      
      const pctX = (tapX / rect.width) * 100;
      const pctY = (tapY / rect.height) * 100;

      // Draw a pin on the screen
      dropPin(tapX, tapY);

      // Save to current session state
      currentShots.push({
        type: activeShotType,
        x: pctX,
        y: pctY,
        timestamp: new Date().toISOString()
      });

      // Fetch the DECADE-style "Strokes to Hole Out" average
      document.getElementById('average-display').textContent = "Calculating...";
      const averageText = await calculateAverageFromDatabase(currentHole, pctX, pctY);
      document.getElementById('average-display').textContent = averageText;
    }

    function dropPin(x, y) {
      const mapContainer = document.getElementById('map-container');
      const img = document.getElementById('hole-image');
      
      // Calculate offset based on image position inside container
      const imgRect = img.getBoundingClientRect();
      const containerRect = mapContainer.getBoundingClientRect();
      
      const pin = document.createElement('div');
      pin.className = 'shot-pin';
      pin.style.left = `${(imgRect.left - containerRect.left) + x}px`;
      pin.style.top = `${(imgRect.top - containerRect.top) + y}px`;
      mapContainer.appendChild(pin);
    }

    async function calculateAverageFromDatabase(holeNum, pctX, pctY) {
      if (!sb) return "DB Offline - Avg: N/A";
      
      // Tolerance: Look for past shots within a 4% radius of this tap
      const TOLERANCE = 4.0; 

      const { data: pastRounds, error } = await sb
        .from('rounds')
        .select('score, plotted')
        .eq('hole_number', holeNum)
        .not('plotted', 'is', null);

      if (error || !pastRounds || pastRounds.length === 0) {
        return "No prior data. You're pioneering!";
      }

      let totalStrokesRemaining = 0;
      let matchingShotsCount = 0;

      pastRounds.forEach(round => {
        if (!round.plotted || !Array.isArray(round.plotted)) return;
        
        round.plotted.forEach((shot, index) => {
           // Check if historical shot is within our tolerance radius
           if (Math.abs(shot.x - pctX) <= TOLERANCE && Math.abs(shot.y - pctY) <= TOLERANCE) {
               // Strokes to hole out = Total Score minus the strokes taken to REACH this spot.
               // (e.g., if you scored a 5, and this was your 2nd shot plot, it took you 3 more to hole out)
               const strokesRemaining = round.score - index; 
               totalStrokesRemaining += strokesRemaining;
               matchingShotsCount++;
           }
        });
      });

      if (matchingShotsCount > 0) {
        const avg = totalStrokesRemaining / matchingShotsCount;
        return `Avg to Hole Out: ${avg.toFixed(1)} (${matchingShotsCount} prior shots)`;
      } else {
        return "New spot! No historical data here.";
      }
    }

    // --- 5. SAVING THE ROUND ---
    async function saveHoleData() {
      if (currentShots.length === 0) {
        return alert("You haven't plotted any shots for this hole yet!");
      }

      // In a full app, this might be a custom modal. For beta, prompt works perfectly.
      const scoreInput = prompt(`What was your total score for Hole ${currentHole}?`);
      if (!scoreInput || isNaN(scoreInput)) return;

      const score = parseInt(scoreInput);

      // Get current authenticated user
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return alert("You must be logged in to save.");

      // Push to Supabase 'rounds' table
      const { error } = await sb.from('rounds').insert({
        user_id: user.id,
        hole_number: currentHole,
        score: score,
        plotted: currentShots // Saves the JSON array of coordinates and shot types
      });

      if (error) {
        alert("Error saving: " + error.message);
      } else {
        alert("Hole saved! Database updated.");
        // Auto-advance to next hole
        changeHole(1);
      }
    }

    // --- 6. PWA SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
      });
    }
  </script>
</body>
</html>
