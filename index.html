        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --tw-color-primary: #001f3f;
            --tw-color-accent: #00c48c;
            --tw-color-gold: #f5c242;
        }
        
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .map-container { filter: brightness(1.05) contrast(1.1); }
        
        .golf-ball {
            animation: golfBallDrop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
        }
        @keyframes golfBallDrop {
            0% { transform: translateY(-60px) scale(0.8); }
            70% { transform: translateY(10px) scale(1.1); }
            100% { transform: translateY(0) scale(1); }
        }

        .live-pulse { animation: livePulse 2s infinite; }
        .overlay-label { text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6); }

        .mobile-frame {
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            background: #001f3f;
            border-radius: 48px;
            box-shadow: 0 0 0 12px #111, 0 0 0 16px #222;
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: #001f3f;
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
            color: white;
        }

        .shot-type-bar {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 31, 63, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 9999px;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 40;
            display: flex;
            gap: 6px;
        }

        .shot-btn {
            padding: 10px 22px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hole-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            padding: 20px;
        }
    </style>
</head>

                const isCurrent = index === currentHoleIndex;
                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center justify-center h-20 rounded-3xl border-2 font-semibold text-sm ${isCurrent ? 'border-[#00c48c] bg-[#00c48c]/10 text-[#00c48c]' : 'border-white/20 hover:border-white/40'}`;
                btn.innerHTML = `
                    <div class="text-3xl font-bold">${hole.number}</div>
                    <div class="text-xs mt-1 opacity-70">Par ${hole.par}</div>
                `;
                btn.onclick = () => {
                    currentHoleIndex = index;
                    closeHoleSelector();
                    loadCurrentHole();
                };
                grid.appendChild(btn);
            });
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeHoleSelector() {
            const modal = document.getElementById('hole-selector-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function renderRegions() {
            const container = document.getElementById('region-overlays');
            container.innerHTML = '';
            const hole = courseData.holes[currentHoleIndex];
            hole.regions.forEach(region => {
                const div = document.createElement('div');
                div.style.position = 'absolute';
                div.style.top = region.top;
                div.style.left = region.left;
                div.style.width = region.width;
                div.style.height = region.height;
                div.style.backgroundColor = region.color;
                div.style.opacity = '0.22';
                div.style.border = `3px solid ${region.color}`;
                div.style.borderRadius = '9999px';
                div.style.pointerEvents = 'auto';
                div.innerHTML = `
                    <div class="overlay-label absolute -top-2 right-2 bg-white text-[#001f3f] text-[10px] font-bold px-3 py-px rounded-3xl shadow-md">${region.avg}</div>
                    <div class="absolute bottom-2 left-3 text-white text-[10px] font-medium drop-shadow-md">${region.name}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderHistoricMarkers() {
            const container = document.getElementById('historic-markers');
            container.innerHTML = '';
            const shots = [{x:22,y:15},{x:68,y:28}];
            shots.forEach(shot => {
                const marker = document.createElement('div');
                marker.className = 'absolute flex items-center justify-center text-4xl opacity-40';
                marker.style.left = `${shot.x}%`;
                marker.style.top = `${shot.y}%`;
                marker.style.transform = 'translate(-50%, -50%)';
                marker.innerHTML = '🏐';
                container.appendChild(marker);
            });
        }

        function renderPlottedBalls() {
            const container = document.getElementById('ball-markers');
            container.innerHTML = '';
            const holeKey = courseData.holes[currentHoleIndex].number;
            if (!currentRound.plottedPositions[holeKey]) return;
            currentRound.plottedPositions[holeKey].forEach(pos => {
                const marker = document.createElement('div');
                marker.className = `absolute golf-ball flex items-center justify-center text-5xl z-30`;
                marker.style.left = `${pos.x}%`;
                marker.style.top = `${pos.y}%`;
                marker.style.transform = 'translate(-50%, -65%)';
                marker.innerHTML = '🏐';
                container.appendChild(marker);
            });
        }

        function handleMapClick(e) {
            if (!isPlotMode) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const xPercent = Math.round(((e.clientX - rect.left) / rect.width) * 100);
            const yPercent = Math.round(((e.clientY - rect.top) / rect.height) * 100);
            
            const holeKey = courseData.holes[currentHoleIndex].number;
            if (!currentRound.plottedPositions[holeKey]) currentRound.plottedPositions[holeKey] = [];
            currentRound.plottedPositions[holeKey].push({ x: xPercent, y: yPercent, type: shotNames[currentShotType] });
            
            liveBallPosition = { x: xPercent, y: yPercent };
            renderPlottedBalls();
            
            const avg = getAvgFromPosition(xPercent, yPercent);
            document.getElementById('live-avg-strokes').textContent = avg.toFixed(1);
            
            const info = document.getElementById('position-info');
            document.getElementById('position-text').innerHTML = `Plotted ${shotNames[currentShotType]}`;
            document.getElementById('strokes-gained-badge').innerHTML = `${avg.toFixed(1)} avg`;
            info.classList.remove('hidden');
            
            showToast(`<b>${shotNames[currentShotType]} plotted</b><br>You average <span class="font-bold">${avg.toFixed(1)}</span> strokes from here.<br>Beat your own record!`, true);
            isPlotMode = false;
        }

        function getAvgFromPosition(x, y) {
            const hole = courseData.holes[currentHoleIndex];
            for (let region of hole.regions) {
                const left = parseFloat(region.left);
                const top = parseFloat(region.top);
                const w = parseFloat(region.width);
                const h = parseFloat(region.height);
                if (x >= left && x <= left + w && y >= top && y <= top + h) return region.avg;
            }
            return 3.5;
        }

        function selectShotType(n) {
            currentShotType = n;
            document.querySelectorAll('.shot-btn').forEach((b, i) => {
                if (i === n) {
                    b.classList.add('active', 'bg-[#00c48c]', 'text-[#001f3f]');
                    b.classList.remove('bg-white/10', 'text-white');
                } else {
                    b.classList.remove('active', 'bg-[#00c48c]', 'text-[#001f3f]');
                    b.classList.add('bg-white/10', 'text-white');
                }
            });
            isPlotMode = true;
            showToast(`Plot your <b>${shotNames[n]}</b> landing spot on the hole…`, false);
        }

        function zoomIn() {
            zoomLevel = Math.min(zoomLevel + 0.3, 3);
            document.getElementById('hole-image').style.transform = `scale(${zoomLevel})`;
        }
        function zoomOut() {
            zoomLevel = Math.max(zoomLevel - 0.3, 0.8);
            document.getElementById('hole-image').style.transform = `scale(${zoomLevel})`;
        }

        function loadCurrentHole() {
            const hole = courseData.holes[currentHoleIndex];
            document.getElementById('current-hole-display').textContent = hole.number;
            document.getElementById('hole-name').innerHTML = `${hole.name} <span class="text-xs bg-white/10 px-3 py-1 rounded-3xl ml-2">Par ${hole.par}</span>`;
            document.getElementById('main-action-button').textContent = `ENTER HOLE ${hole.number} SCORE`;
            document.getElementById('hole-image').src = hole.image;
            renderRegions();
            renderHistoricMarkers();
            renderPlottedBalls();
            document.getElementById('live-avg-strokes').textContent = "4.0";
        }

        function toggleSpectatorMode() {
            isSpectatorMode = !isSpectatorMode;
            const modal = document.getElementById('spectator-modal');
            if (isSpectatorMode) {
                modal.style.display = 'flex';
                document.getElementById('spectator-image').src = courseData.holes[currentHoleIndex].image;
                renderSpectator();
            } else {
                modal.style.display = 'none';
            }
        }

        function renderSpectator() {
            const container = document.getElementById('spectator-overlays');
            container.innerHTML = document.getElementById('region-overlays').innerHTML;
            const ballContainer = document.getElementById('spectator-balls');
            ballContainer.innerHTML = `<div class="absolute flex items-center justify-center text-6xl live-pulse" style="left:${liveBallPosition.x}%;top:${liveBallPosition.y}%;transform:translate(-50%,-50%)">🏐</div>`;
        }

        function endRound() {
            const modal = document.getElementById('summary-modal');
            modal.style.display = 'flex';
            document.getElementById('modal-hole-title').textContent = `Hole ${courseData.holes[currentHoleIndex].number} complete`;
            const tbody = document.getElementById('full-scorecard');
            tbody.innerHTML = `
                <tr><td class="py-4">Tee</td><td class="text-center">Tee box</td><td class="text-center">4.0</td><td class="text-right">—</td></tr>
                <tr><td class="py-4">Approach</td><td class="text-center">Left rough</td><td class="text-center">4.0</td><td class="text-right">2</td></tr>
                <tr><td class="py-4">Chip</td><td class="text-center">Short side</td><td class="text-center">1.6</td><td class="text-right">—</td></tr>
                <tr><td class="py-4">Putt</td><td class="text-center">Green</td><td class="text-center">1.2</td><td class="text-right">2</td></tr>
            `;
        }

        function hideSummary() { document.getElementById('summary-modal').style.display = 'none'; }
        function exportToGHIN() {
            hideSummary();
            showToast('✅ GHIN data copied to clipboard!<br>Paste directly into the USGA app', true);
        }

        function showToast(message, important) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.style.backgroundColor = important ? '#00c48c' : '#f5c242';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3400);
        }

        window.onload = function() {
            loadCurrentHole();
            console.log('%c✅ Bey Lea Busta PWA ready!', 'background:#001f3f;color:#00c48c;padding:4px 8px;border-radius:6px;font-size:14px');
            console.log('1. Save this as index.html');
            console.log('2. Add manifest.json and sw.js (see instructions)');
            console.log('3. Upload to GitHub Pages or any static host → Add to Home Screen on your phone');
        };
    </script>
</body>
</html>
