<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#001f3f">
    <title>Bey Lea Busta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --tw-color-primary: #001f3f;
            --tw-color-accent: #00c48c;
            --tw-color-gold: #f5c242;
        }
        
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .map-container { filter: brightness(1.05) contrast(1.1); }
        
        .golf-ball {
            animation: golfBallDrop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
        }
        @keyframes golfBallDrop {
            0% { transform: translateY(-60px) scale(0.8); }
            70% { transform: translateY(10px) scale(1.1); }
            100% { transform: translateY(0) scale(1); }
        }

        .live-pulse { animation: livePulse 2s infinite; }
        .overlay-label { text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6); }

        .mobile-frame {
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            background: #001f3f;
            border-radius: 48px;
            box-shadow: 0 0 0 12px #111, 0 0 0 16px #222;
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: #001f3f;
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
            color: white;
        }

        .bottom-bar {
            background: #001f3f;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px 20px;
        }

        .cancel-plot {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="mobile-frame flex flex-col">
        
        <!-- Status bar -->
        <div class="status-bar">
            <div class="flex-1">9:41</div>
            <div class="flex-1 text-center font-medium text-[#00c48c]">Bey Lea Busta</div>
            <div class="flex-1 text-right flex items-center justify-end gap-x-1">
                <span>92%</span>
                <span class="text-xl">📶</span>
            </div>
        </div>

        <!-- Header with hole selector -->
        <div class="bg-[#001f3f] px-5 py-3 flex items-center justify-between border-b border-white/10">
            <div class="flex items-center gap-x-2">
                <div class="w-8 h-8 bg-white rounded-2xl flex items-center justify-center ring-4 ring-[#00c48c]/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-[#001f3f]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="4" fill="#00c48c"/>
                    </svg>
                </div>
                <div class="title-font text-2xl tracking-[-1px]">Bey Lea Busta</div>
            </div>

            <div id="round-pill" onclick="openHoleSelector()" 
                 class="flex items-center bg-white/10 hover:bg-white/20 px-5 h-9 rounded-3xl text-sm font-semibold cursor-pointer">
                <div class="w-2 h-2 bg-[#00c48c] rounded-full live-pulse mr-2"></div>
                Hole <span id="current-hole-display" class="font-bold text-[#00c48c] ml-1 text-lg">1</span>
            </div>

            <button onclick="toggleSpectatorMode()" class="flex items-center text-[#f5c242] text-2xl">👀</button>
        </div>

        <!-- MAP -->
        <div class="flex-1 relative flex flex-col overflow-hidden">
            <div id="map-wrapper" class="relative flex-1 bg-black overflow-hidden cursor-crosshair map-container"
                 onclick="if(event.target.id === 'map-wrapper' && isPlotMode) handleMapClick(event)">
                
                <div id="map-zoom-container" class="absolute inset-0 overflow-hidden">
                    <img id="hole-image" 
                         src="https://picsum.photos/id/1015/1920/1080"
                         alt="Bey Lea Hole"
                         class="absolute inset-0 w-full h-full object-cover pointer-events-none transition-transform duration-200"
                         style="transform: scale(1);">
                </div>
                
                <div id="region-overlays" class="absolute inset-0 pointer-events-none"></div>
                <div id="ball-markers" class="absolute inset-0 pointer-events-none"></div>
                
                <!-- Cancel plotting button (only shows in plotting mode) -->
                <div id="cancel-plot-btn" onclick="cancelPlotMode()" 
                     class="cancel-plot hidden">✕</div>

                <!-- Zoom controls only -->
                <div class="absolute top-6 right-6 bg-black/70 rounded-3xl flex flex-col text-2xl z-30 shadow-2xl overflow-hidden">
                    <button onclick="zoomIn()" class="px-4 py-2 hover:bg-white/20 active:bg-white/30">+</button>
                    <button onclick="zoomOut()" class="px-4 py-2 border-t border-white/20 hover:bg-white/20 active:bg-white/30">−</button>
                </div>
            </div>

            <!-- COMBINED BOTTOM BAR -->
            <div class="bottom-bar">
                <!-- Shot type buttons -->
                <div class="flex gap-2 mb-4">
                    <button onclick="selectShotType(0)" id="shot-btn-0" class="shot-btn flex-1 active bg-[#00c48c] text-[#001f3f]">Tee</button>
                    <button onclick="selectShotType(1)" id="shot-btn-1" class="shot-btn flex-1 bg-white/10 text-white">Approach</button>
                    <button onclick="selectShotType(2)" id="shot-btn-2" class="shot-btn flex-1 bg-white/10 text-white">Chip</button>
                    <button onclick="selectShotType(3)" id="shot-btn-3" class="shot-btn flex-1 bg-white/10 text-white">Putt</button>
                </div>

                <!-- Big Enter Score button -->
                <button onclick="endRound()" 
                        id="main-action-button"
                        class="w-full h-14 flex items-center justify-center bg-[#00c48c] hover:bg-[#00e6a0] text-[#001f3f] rounded-3xl text-lg font-semibold shadow-2xl">
                    ENTER HOLE 1 SCORE
                </button>

                <div class="flex justify-center items-center gap-x-2 mt-4 text-sm">
                    <span class="text-white/60 text-xs tracking-widest">FROM THIS SPOT YOU AVERAGE</span>
                    <span id="live-avg-strokes" class="font-bold text-4xl text-[#f5c242]">4.0</span>
                    <span class="text-white/60 text-xs tracking-widest">STROKES TO HOLE OUT</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Hole selector modal, summary modal, spectator modal, toast (unchanged) -->
    <!-- ... (the rest of the HTML from previous version is identical) ... -->
    <!-- For brevity I kept only the changed parts above. Replace your full file with this one and keep the modals from the previous version. -->

    <script>

        let courseData = { /* same 18-hole data as before */ 
            // ... (copy the courseData object from my previous message) ...
        };

        let currentHoleIndex = 0;
        let currentRound = { scores: {}, plottedPositions: {} };
        let isPlotMode = false;
        let currentShotType = 0;
        let isSpectatorMode = false;
        let zoomLevel = 1;
        let liveBallPosition = { x: 48, y: 35 };
        const shotNames = ["Tee", "Approach", "Chip", "Putt"];

        function selectShotType(n) {
            currentShotType = n;
            document.querySelectorAll('.shot-btn').forEach((b, i) => {
                if (i === n) b.classList.add('active', 'bg-[#00c48c]', 'text-[#001f3f]');
                else b.classList.remove('active', 'bg-[#00c48c]', 'text-[#001f3f]');
            });
            isPlotMode = true;
            document.getElementById('cancel-plot-btn').classList.remove('hidden');
            showToast(`Plot your <b>${shotNames[n]}</b> — tap the map`, false);
        }

        function cancelPlotMode() {
            isPlotMode = false;
            document.getElementById('cancel-plot-btn').classList.add('hidden');
        }

        function handleMapClick(e) {
            if (!isPlotMode) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
            const y = Math.round(((e.clientY - rect.top) / rect.height) * 100);

            const holeKey = courseData.holes[currentHoleIndex].number;
            if (!currentRound.plottedPositions[holeKey]) currentRound.plottedPositions[holeKey] = [];
            currentRound.plottedPositions[holeKey].push({ x, y, type: shotNames[currentShotType] });

            renderPlottedBalls();

            const avg = getAvgFromPosition(x, y);
            document.getElementById('live-avg-strokes').textContent = avg.toFixed(1);

            showToast(`<b>${shotNames[currentShotType]} plotted</b><br>Avg strokes to hole out: <span class="font-bold">${avg.toFixed(1)}</span>`, true);
            
            // Stay in plotting mode so you can plot multiple shots (tee + approach etc.)
        }

            loadCurrentHole();

        };
    </script>
</body>
</html>
