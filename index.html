<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>Bey Lea Busta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

<style>
  /* DESIGN TOKENS */
  :root {
    --navy: #0a1628; --navy-mid: #0f2040; --navy-light: #162d55;
    --green: #00d68f; --green-dim: #00a872;
    --gold: #f0c040; --red: #ff4d6d; --blue: #3b82f6;
    --white: #f0f4ff; --muted: #8b9bb4;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--navy); color: var(--white);
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden; 
  }

  /* --- AUTH SCREEN --- */
  #screen-auth { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
  .auth-tabs { display: flex; margin-bottom: 20px; background: var(--navy-mid); border-radius: 8px; overflow: hidden; }
  .auth-tab { background: transparent; color: var(--muted); border: none; padding: 10px 20px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: 0.3s; }
  .auth-tab.active { background: var(--green); color: var(--navy); }
  .auth-input { width: 100%; max-width: 300px; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--navy-light); background: var(--navy-mid); color: var(--white); font-size: 16px; }
  .auth-btn { width: 100%; max-width: 300px; padding: 15px; border-radius: 8px; border: none; background: var(--gold); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; }

  /* --- GAME SCREEN --- */
  #screen-game { display: none; flex-direction: column; height: 100%; }
  
  .header-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); }
  .nav-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; padding: 5px 15px; font-weight: bold; }
  
  .shot-selector { display: flex; justify-content: space-between; padding: 10px; background: var(--navy); }
  .shot-btn { flex: 1; margin: 0 2px; padding: 8px 0; background: var(--navy-mid); color: var(--muted); border: 1px solid var(--navy-light); border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
  .shot-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
  
  /* Map Area & Zoom Mechanics */
  #map-container { 
    flex-grow: 1; 
    display: flex; justify-content: center; align-items: center; 
    background: #000; overflow: hidden; 
  }
  
  /* The wrapper tight-fits the image. This ensures our percentage-based 
    pin placements stay perfectly locked to the turf even when zoomed! 
  */
  #zoom-wrapper { position: relative; display: inline-block; }
  #hole-image { display: block; max-width: 100vw; max-height: 65vh; object-fit: contain; pointer-events: none; }
  
  /* Visual Pins (Color Coded!) */
  .shot-pin {
    position: absolute;
    width: 14px; height: 14px;
    border: 2px solid white; border-radius: 50%;
    transform: translate(-50%, -50%); /* Center on exact tap coordinate */
    pointer-events: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.8);
    z-index: 10;
  }
  .pin-Tee { background-color: var(--red); }
  .pin-Approach { background-color: var(--blue); }
  .pin-Chip { background-color: var(--gold); }
  .pin-Putt { background-color: var(--green); }

  /* Data & Actions */
  .data-panel { padding: 15px; text-align: center; background: var(--navy-mid); border-top: 1px solid var(--navy-light); z-index: 20; }
  .avg-text { font-family: 'DM Mono', monospace; color: var(--green); font-size: 18px; margin-bottom: 10px; }
  .save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--gold); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer;}

  /* --- SCORE MODAL (GHIN DATA PREFILL) --- */
  #score-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-content {
    background: var(--navy-mid); padding: 25px; border-radius: 12px; width: 85%; max-width: 400px;
    border: 1px solid var(--navy-light);
  }
  .modal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .modal-input { width: 60px; padding: 10px; text-align: center; border-radius: 6px; border: none; background: var(--navy-light); color: white; font-weight: bold; font-size: 16px; }
  .modal-check { transform: scale(1.5); accent-color: var(--green); }
</style>
</head>
<body>

  <div id="screen-auth">
    <h1 style="font-family: 'Syne', sans-serif; color: var(--green); font-size: 32px; text-align: center; line-height: 1.1;">BEY LEA<br>BUSTA</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">DECADE Strategy Tracker</p>
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">LOGIN</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">SIGN UP</button>
    </div>

    <input type="email" id="field-email" class="auth-input" placeholder="Email Address">
    <input type="password" id="field-pass" class="auth-input" placeholder="Password">
    <button id="auth-submit" class="auth-btn" onclick="handleAuth()">LOGIN</button>
  </div>

  <div id="screen-game">
    <div class="header-bar">
      <button class="nav-btn" onclick="changeHole(-1)">◀ PREV</button>
      <h2 id="hole-title" style="margin: 0; font-family: 'Syne', sans-serif;">Hole 1</h2>
      <button class="nav-btn" onclick="changeHole(1)">NEXT ▶</button>
    </div>

    <div class="shot-selector" id="shot-selector">
      <button class="shot-btn active" onclick="setShotType('Tee', this)">TEE</button>
      <button class="shot-btn" onclick="setShotType('Approach', this)">APPROACH</button>
      <button class="shot-btn" onclick="setShotType('Chip', this)">CHIP</button>
      <button class="shot-btn" onclick="setShotType('Putt', this)">PUTT</button>
    </div>

    <div id="map-container">
      <div id="zoom-wrapper" onclick="handleMapTap(event)">
        <img id="hole-image" src="./images/Hole1.png" alt="Hole Map">
        </div>
    </div>

    <div class="data-panel">
      <div id="average-display" class="avg-text">Awaiting Shot Plot...</div>
      <button id="save-hole-btn" class="save-btn" onclick="openScoreModal()">Enter Hole 1 Score</button>
    </div>
  </div>

  <div id="score-modal">
    <div class="modal-content">
      <h2 style="margin-top: 0; color: var(--gold); border-bottom: 1px solid var(--navy-light); padding-bottom: 10px;">Hole <span id="modal-hole-num">1</span> Stats</h2>
      
      <div class="modal-row">
        <label style="font-weight: bold;">Total Strokes</label>
        <input type="number" id="modal-score" class="modal-input" min="1">
      </div>
      
      <div class="modal-row">
        <label style="font-weight: bold;">Putts</label>
        <input type="number" id="modal-putts" class="modal-input" min="0">
      </div>
      
      <div class="modal-row">
        <label>Fairway in Reg. (FIR)</label>
        <input type="checkbox" id="modal-fir" class="modal-check">
      </div>
      
      <div class="modal-row">
        <label>Green in Reg. (GIR)</label>
        <input type="checkbox" id="modal-gir" class="modal-check">
      </div>

      <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button class="auth-btn" style="background: var(--navy-light); color: white;" onclick="closeScoreModal()">Cancel</button>
        <button class="auth-btn" onclick="submitScoreToDB()">SAVE DATA</button>
      </div>
    </div>
  </div>

  <script>
    // --- 1. SUPABASE INITIALIZATION ---
    const SUPABASE_URL = 'https://nawebecmrjoyuapwhuaq.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hd2ViZWNtcmpveXVhcHdodWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjY2NjEsImV4cCI6MjA5MDEwMjY2MX0.bKOoBYFDTEw0QYvFmoSuOjcqRioN44OkqgpLfX42sG0';
    
    let sb = null;
    try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } 
    catch (err) { console.error("Supabase fail:", err); }

    // --- 2. PANZOOM SETUP (MOBILE PINCH ZOOM) ---
    let panzoomInstance = null;
    
    function initPanzoom() {
      const zoomWrapper = document.getElementById('zoom-wrapper');
      panzoomInstance = Panzoom(zoomWrapper, {
        maxScale: 5,
        minScale: 1,
        contain: 'outside', // Keeps image from getting lost off-screen
        step: 0.3
      });
      // Allow mousewheel zooming for desktop testing
      zoomWrapper.parentElement.addEventListener('wheel', panzoomInstance.zoomWithWheel);
    }

    // --- 3. AUTHENTICATION ---
    let authMode = 'login'; 

    function switchAuthTab(mode) {
      authMode = mode;
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', mode === 'login');
      tabs[1].classList.toggle('active', mode === 'signup');
      document.getElementById('auth-submit').textContent = mode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
    }

    async function handleAuth() {
      const email = document.getElementById('field-email').value;
      const pass = document.getElementById('field-pass').value;
      const btn = document.getElementById('auth-submit');
      
      if (!email || !pass) return alert("Please enter email and password.");
      btn.textContent = 'LOADING…'; btn.disabled = true;

      try {
        if (authMode === 'signup') {
          const { error } = await sb.auth.signUp({ email, password: pass });
          if (error) throw error;
          alert("Account Created! Switch to LOGIN.");
          switchAuthTab('login');
        } else {
          const { error } = await sb.auth.signInWithPassword({ email, password: pass });
          if (error) throw error;
          
          document.getElementById('screen-auth').style.display = 'none';
          document.getElementById('screen-game').style.display = 'flex';
          
          // Initialize map interactions
          initPanzoom();
          loadHole(1);
        }
      } catch (err) {
        alert("Auth Error: " + err.message);
      }
      btn.textContent = authMode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN'; btn.disabled = false;
    }

    // --- 4. COURSE STATE & NAVIGATION ---
    let currentHole = 1;
    const TOTAL_HOLES = 9; 
    let currentShots = []; 
    let activeShotType = 'Tee'; 

    function loadHole(holeNumber) {
      currentHole = holeNumber;
      document.getElementById('hole-title').textContent = `Hole ${holeNumber}`;
      document.getElementById('hole-image').src = `./images/Hole${holeNumber}.png`;
      
      // Update dynamic save button text
      document.getElementById('save-hole-btn').textContent = `Enter Hole ${holeNumber} Score`;
      
      // Reset hole state and zoom
      currentShots = [];
      document.getElementById('average-display').textContent = "Awaiting Shot Plot...";
      document.querySelectorAll('.shot-pin').forEach(pin => pin.remove());
      
      if (panzoomInstance) panzoomInstance.reset();
      
      // Reset shot type to Tee
      document.querySelectorAll('.shot-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.shot-btn')[0].classList.add('active');
      activeShotType = 'Tee';
    }

    function changeHole(direction) {
      let newHole = currentHole + direction;
      if (newHole < 1) newHole = 1;
      if (newHole > TOTAL_HOLES) newHole = TOTAL_HOLES;
      if (newHole !== currentHole) loadHole(newHole);
    }

    function setShotType(type, buttonElement) {
      activeShotType = type;
      document.querySelectorAll('.shot-btn').forEach(btn => btn.classList.remove('active'));
      buttonElement.classList.add('active');
    }

    // --- 5. MAP TAPPING & AVERAGES ---
    async function handleMapTap(event) {
      // Prevent dropping a pin if the user was just dragging/panning the map
      // (Panzoom stops click events automatically if panning occurred, so this is clean)
      
      // RULE: Only 1 Tee plot allowed per hole
      if (activeShotType === 'Tee' && currentShots.some(shot => shot.type === 'Tee')) {
        alert("You have already plotted a Tee shot. Please switch to Approach, Chip, or Putt.");
        return; 
      }

      const wrapper = document.getElementById('zoom-wrapper');
      const rect = wrapper.getBoundingClientRect();
      
      // Calculate tap position relative to the scaled wrapper
      const tapX = event.clientX - rect.left;
      const tapY = event.clientY - rect.top;
      
      // Convert to strict percentages so pins scale perfectly with the zoom
      const pctX = (tapX / rect.width) * 100;
      const pctY = (tapY / rect.height) * 100;

      dropPin(pctX, pctY, activeShotType);

      currentShots.push({ type: activeShotType, x: pctX, y: pctY, timestamp: new Date().toISOString() });

      document.getElementById('average-display').textContent = "Calculating...";
      const averageText = await calculateAverageFromDatabase(currentHole, pctX, pctY);
      document.getElementById('average-display').textContent = averageText;
    }

    function dropPin(pctX, pctY, type) {
      const wrapper = document.getElementById('zoom-wrapper');
      const pin = document.createElement('div');
      pin.className = `shot-pin pin-${type}`;
      pin.style.left = `${pctX}%`;
      pin.style.top = `${pctY}%`;
      wrapper.appendChild(pin);
    }

    async function calculateAverageFromDatabase(holeNum, pctX, pctY) {
      if (!sb) return "DB Offline - Avg: N/A";
      const TOLERANCE = 4.0; 

      const { data: pastRounds, error } = await sb
        .from('rounds')
        .select('score, plotted')
        .eq('hole_number', holeNum)
        .not('plotted', 'is', null);

      if (error || !pastRounds || pastRounds.length === 0) return "New spot! No historical data here.";

      let totalStrokesRemaining = 0; let matchingShotsCount = 0;

      pastRounds.forEach(round => {
        if (!round.plotted) return;
        round.plotted.forEach((shot, index) => {
           if (Math.abs(shot.x - pctX) <= TOLERANCE && Math.abs(shot.y - pctY) <= TOLERANCE) {
               totalStrokesRemaining += (round.score - index); 
               matchingShotsCount++;
           }
        });
      });

      return matchingShotsCount > 0 
        ? `Avg to Hole Out: ${(totalStrokesRemaining / matchingShotsCount).toFixed(1)} (${matchingShotsCount} prior shots)`
        : "New spot! No historical data here.";
    }

    // --- 6. SMART SCORE MODAL ---
    function openScoreModal() {
      if (currentShots.length === 0) return alert("You haven't plotted any shots for this hole yet!");
      
      document.getElementById('modal-hole-num').textContent = currentHole;
      
      // Smart Pre-fill logic based on plots
      const puttsPlotted = currentShots.filter(s => s.type === 'Putt').length;
      const totalPlotted = currentShots.length;
      
      // Defaults: Total score assumes 1 shot per plot. 
      // FIR assumes yes unless specifically marked missed (left to user for now).
      document.getElementById('modal-score').value = totalPlotted;
      document.getElementById('modal-putts').value = puttsPlotted;
      document.getElementById('modal-fir').checked = false; // User toggles
      document.getElementById('modal-gir').checked = false; // User toggles

      document.getElementById('score-modal').style.display = 'flex';
    }

    function closeScoreModal() {
      document.getElementById('score-modal').style.display = 'none';
    }

    async function submitScoreToDB() {
      const score = parseInt(document.getElementById('modal-score').value);
      const putts = parseInt(document.getElementById('modal-putts').value);
      const fir = document.getElementById('modal-fir').checked;
      const gir = document.getElementById('modal-gir').checked;

      const { data: { user } } = await sb.auth.getUser();
      if (!user) return alert("Session expired. Please log in again.");

      const { error } = await sb.from('rounds').insert({
        user_id: user.id,
        hole_number: currentHole,
        score: score,
        putts: putts,
        fir: fir,
        gir: gir,
        plotted: currentShots // Saves the JSON array of coordinates and shot types
      });

      if (error) {
        alert("Error saving: " + error.message);
      } else {
        closeScoreModal();
        changeHole(1); // Auto-advance
      }
    }

    // --- 7. PWA SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
      });
    }
  </script>
</body>
</html>
