<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>Bey Lea Busta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* DESIGN TOKENS */
  :root {
    --navy: #0a1628; --navy-mid: #0f2040; --navy-light: #162d55;
    --green: #00d68f; --green-dim: #00a872;
    --gold: #f0c040; --red: #ff4d6d; --blue: #3b82f6;
    --white: #f0f4ff; --muted: #8b9bb4;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--navy);
    color: var(--white);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* AUTH SCREEN STYLES */
  #screen-auth {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 20px;
  }

  .auth-tabs {
    display: flex;
    margin-bottom: 20px;
    background: var(--navy-mid);
    border-radius: 8px;
    overflow: hidden;
  }

  .auth-tab {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
  }

  .auth-tab.active {
    background: var(--green);
    color: var(--navy);
  }

  .auth-input {
    width: 100%;
    max-width: 300px;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid var(--navy-light);
    background: var(--navy-mid);
    color: var(--white);
    font-size: 16px;
  }

  .auth-btn {
    width: 100%;
    max-width: 300px;
    padding: 15px;
    border-radius: 8px;
    border: none;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
  }

  /* GAME SCREEN STYLES */
  #screen-game {
    display: none; /* Hidden by default until login */
    flex-direction: column;
    height: 100%;
  }

  #map-container {
    flex-grow: 1;
    background: var(--navy-mid);
    position: relative;
    /* Placeholder styles for your map */
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--green-dim);
    margin: 10px;
  }
</style>
</head>
<body>

  <div id="screen-auth">
    <h1 style="font-family: 'Syne', sans-serif; color: var(--green);">BEY LEA BUSTA</h1>
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">LOGIN</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">SIGN UP</button>
    </div>

    <input type="email" id="field-email" class="auth-input" placeholder="Email Address">
    <input type="password" id="field-pass" class="auth-input" placeholder="Password">
    
    <button id="auth-submit" class="auth-btn" onclick="handleAuth()">LOGIN</button>
  </div>

  <div id="screen-game">
    <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
      <h2 id="hole-title" style="margin: 0;">Hole 1</h2>
      <span style="font-size: 24px;">👥</span> </div>

    <div id="map-container" onclick="handleMapTap(event)">
      <p style="color: var(--muted); text-align: center;">Map Canvas Area<br>(Tap to test average calculation)</p>
    </div>

    <div id="average-display" style="padding: 15px; text-align: center; font-family: 'DM Mono', monospace; color: var(--gold);">
      Awaiting tap...
    </div>
  </div>

  <script>
    // --- 1. SUPABASE INITIALIZATION ---
    const SUPABASE_URL = 'https://nawebecmrjoyuapwhuaq.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hd2ViZWNtcmpveXVhcHdodWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjY2NjEsImV4cCI6MjA5MDEwMjY2MX0.bKOoBYFDTEw0QYvFmoSuOjcqRioN44OkqgpLfX42sG0';
    
    let sb = null;
    try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } catch (err) {
      console.error("Supabase failed to initialize:", err);
    }

    // --- 2. AUTHENTICATION LOGIC ---
    let authMode = 'login'; // Defaults to login

    function switchAuthTab(mode) {
      authMode = mode;
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', mode === 'login');
      tabs[1].classList.toggle('active', mode === 'signup');
      
      const btn = document.getElementById('auth-submit');
      btn.textContent = mode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
    }

    async function handleAuth() {
      const email = document.getElementById('field-email').value;
      const pass = document.getElementById('field-pass').value;
      const btn = document.getElementById('auth-submit');
      
      if (!email || !pass) {
        alert("Please enter an email and password first.");
        return;
      }

      btn.textContent = 'LOADING…';
      btn.disabled = true;

      if (!sb) {
        alert("Database connection is missing! Check your Supabase URL and Key.");
        btn.textContent = authMode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
        btn.disabled = false;
        return;
      }

      try {
        if (authMode === 'signup') {
          // SIGN UP
          const { data, error } = await sb.auth.signUp({ email: email, password: pass });
          if (error) {
            alert("Signup Error: " + error.message);
          } else {
            alert("Account Created! You can now switch to LOGIN.");
            switchAuthTab('login'); // Automatically switch them to login mode
          }
        } else {
          // LOGIN
          const { data, error } = await sb.auth.signInWithPassword({ email: email, password: pass });
          if (error) {
            alert("Login Error: " + error.message);
          } else {
            // SUCCESS! 
            showScreen('game');
            loadHole(1); // Load Hole 1 immediately
          }
        }
      } catch (err) {
        alert("An unexpected error occurred: " + err.message);
      }

      // Reset button
      btn.textContent = authMode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
      btn.disabled = false;
    }

    // --- 3. ROUTING & UI LOGIC ---
    function showScreen(screenName) {
      document.getElementById('screen-auth').style.display = 'none';
      document.getElementById('screen-game').style.display = 'none';
      
      document.getElementById(`screen-${screenName}`).style.display = 'flex';
    }

    // --- 4. GAME & MAP LOGIC ---
    let currentHole = 1;

    function loadHole(holeNumber) {
      currentHole = holeNumber;
      document.getElementById('hole-title').textContent = `Hole ${holeNumber}`;
      // *Insert your specific Bey Lea map drawing/canvas logic here*
    }

    async function handleMapTap(event) {
      // Get rough coordinates of the tap relative to the container
      const rect = event.target.getBoundingClientRect();
      const tapX = event.clientX - rect.left;
      const tapY = event.clientY - rect.top;

      const display = document.getElementById('average-display');
      display.textContent = "Calculating average...";

      // Call the Supabase function
      const averageText = await getAverageFromSpot(currentHole, tapX, tapY);
      display.textContent = averageText;
    }

    async function getAverageFromSpot(holeNumber, tapX, tapY) {
      if (!sb) return "Database offline.";
      
      const tolerance = 20; // Pixel radius to search for previous shots

      // Fetch previous rounds for this hole
      const { data: previousRounds, error } = await sb
        .from('rounds')
        .select('score, plotted')
        .eq('hole_number', holeNumber)
        .not('plotted', 'is', null);

      if (error || !previousRounds || previousRounds.length === 0) {
        return "No prior data here. Good luck!";
      }

      let totalStrokesRemaining = 0;
      let matchingShotsCount = 0;

      // Loop through past rounds to find nearby shots
      previousRounds.forEach(round => {
        if (!round.plotted || !Array.isArray(round.plotted)) return;
        
        round.plotted.forEach((shot, index) => {
           if (Math.abs(shot.x - tapX) <= tolerance && Math.abs(shot.y - tapY) <= tolerance) {
               // Total score minus strokes taken to reach this spot
               const strokesRemaining = round.score - index; 
               totalStrokesRemaining += strokesRemaining;
               matchingShotsCount++;
           }
        });
      });

      if (matchingShotsCount > 0) {
        const average = totalStrokesRemaining / matchingShotsCount;
        return `Avg to Hole Out: ${average.toFixed(1)} (from ${matchingShotsCount} prior shots)`;
      } else {
        return "First time hitting from here!";
      }
    }

    // --- 5. SERVICE WORKER FOR PWA ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('SW registered: ', registration.scope);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>
</html>
