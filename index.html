<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>Bey Lea Busta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

<style>
  /* DESIGN TOKENS */
  :root {
    --navy: #0a1628; --navy-mid: #0f2040; --navy-light: #162d55;
    --green: #00d68f; --green-dim: #00a872;
    --gold: #f0c040; --red: #ff4d6d; --blue: #3b82f6;
    --white: #f0f4ff; --muted: #8b9bb4;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--navy); color: var(--white);
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden; 
  }

  button { cursor: pointer; }

  /* --- AUTH SCREEN --- */
  #screen-auth { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
  .auth-tabs { display: flex; margin-bottom: 20px; background: var(--navy-mid); border-radius: 8px; overflow: hidden; }
  .auth-tab { background: transparent; color: var(--muted); border: none; padding: 10px 20px; font-family: 'Syne', sans-serif; font-weight: 700; transition: 0.3s; }
  .auth-tab.active { background: var(--green); color: var(--navy); }
  .auth-input { width: 100%; max-width: 300px; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--navy-light); background: var(--navy-mid); color: var(--white); font-size: 16px; }
  .auth-btn { width: 100%; max-width: 300px; padding: 15px; border-radius: 8px; border: none; background: var(--gold); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; }

  /* --- GAME SCREEN (MAP) --- */
  #screen-game { display: none; flex-direction: column; height: 100%; }
  
  .header-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); }
  .nav-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; padding: 5px 15px; font-weight: bold; }
  
  .shot-selector { display: flex; justify-content: space-between; padding: 10px; background: var(--navy); }
  .shot-btn { flex: 1; margin: 0 2px; padding: 10px 0; background: var(--navy-mid); color: var(--muted); border: 1px solid var(--navy-light); border-radius: 4px; font-size: 12px; font-weight: bold; }
  .shot-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
  
  #map-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
  #zoom-wrapper { position: relative; display: inline-block; }
  #hole-image { display: block; max-width: 100vw; max-height: 60vh; object-fit: contain; pointer-events: none; }
  
  .shot-pin {
    position: absolute; width: 16px; height: 16px;
    border: 2px solid white; border-radius: 50%;
    transform: translate(-50%, -50%); pointer-events: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.8); z-index: 10;
  }
  .pin-Tee { background-color: var(--red); }
  .pin-Approach { background-color: var(--blue); }
  .pin-Chip { background-color: var(--gold); }
  .pin-Putt { background-color: var(--green); }

  .data-panel { padding: 15px; text-align: center; background: var(--navy-mid); border-top: 1px solid var(--navy-light); z-index: 20; }
  .avg-text { font-family: 'DM Mono', monospace; color: var(--green); font-size: 18px; margin-bottom: 10px; }
  .save-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--gold); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; }

  /* --- SCORE ENTRY SCREEN (GHIN STYLE) --- */
  #screen-score { display: none; flex-direction: column; height: 100%; background: var(--navy); overflow-y: auto; }
  
  .score-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); }
  .back-btn { background: none; border: none; color: var(--blue); font-size: 16px; font-weight: bold; padding: 0; }
  
  .hole-indicator { display: flex; justify-content: center; gap: 5px; padding: 15px; overflow-x: auto; background: var(--navy-mid); }
  .hole-circle { width: 30px; height: 30px; border-radius: 50%; background: var(--navy-light); display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; color: var(--muted); }
  .hole-circle.active { background: var(--green); color: var(--navy); }

  .score-card-section { padding: 20px; flex-grow: 1; }
  .par-info { text-align: center; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 25px; font-size: 14px; }

  .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--navy-light); }
  .entry-label { font-size: 18px; font-weight: 600; }
  
  /* Number adjusters for Score & Putts */
  .number-adjuster { display: flex; align-items: center; gap: 15px; }
  .adj-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--blue); background: transparent; color: var(--blue); font-size: 24px; display: flex; justify-content: center; align-items: center; }
  .num-display { font-size: 28px; font-weight: 800; width: 40px; text-align: center; font-family: 'DM Mono', monospace; }

  /* Segmented Controls for Drive/GIR */
  .segment-group { display: flex; gap: 5px; background: var(--navy-mid); padding: 5px; border-radius: 8px; }
  .segment-btn { flex: 1; padding: 10px 15px; background: transparent; border: none; color: var(--muted); font-weight: bold; border-radius: 4px; transition: 0.2s; }
  .segment-btn.active { background: var(--blue); color: white; }
  .segment-btn.active-green { background: var(--green); color: var(--navy); }

  .bottom-bar { padding: 20px; background: var(--navy-mid); border-top: 1px solid var(--navy-light); }
  .next-hole-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--green); color: var(--navy); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }

</style>
</head>
<body>

  <div id="screen-auth">
    <h1 style="font-family: 'Syne', sans-serif; color: var(--green); font-size: 36px; text-align: center; line-height: 1.1; margin-bottom: 5px;">BEY LEA<br>BUSTA</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">DECADE Strategy Tracker</p>
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">LOGIN</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">SIGN UP</button>
    </div>

    <input type="email" id="field-email" class="auth-input" placeholder="Email Address">
    <input type="password" id="field-pass" class="auth-input" placeholder="Password">
    <button id="auth-submit" class="auth-btn" onclick="handleAuth()">LOGIN</button>
  </div>


  <div id="screen-game">
    <div class="header-bar">
      <h2 id="hole-title" style="margin: 0; font-family: 'Syne', sans-serif; font-size: 22px;">Hole 1</h2>
      <button class="nav-btn" onclick="openScoreScreen()">ENTER SCORE</button>
    </div>

    <div class="shot-selector" id="shot-selector">
      <button class="shot-btn active" onclick="setShotType('Tee', this)">TEE</button>
      <button class="shot-btn" onclick="setShotType('Approach', this)">APPROACH</button>
      <button class="shot-btn" onclick="setShotType('Chip', this)">CHIP</button>
      <button class="shot-btn" onclick="setShotType('Putt', this)">PUTT</button>
    </div>

    <div id="map-container">
      <div id="zoom-wrapper" onclick="handleMapTap(event)">
        <img id="hole-image" src="./images/Hole1.png" alt="Hole Map">
      </div>
    </div>

    <div class="data-panel">
      <div id="average-display" class="avg-text">Awaiting Shot Plot...</div>
      <button id="save-hole-btn" class="save-btn" onclick="openScoreScreen()">Enter Hole 1 Score</button>
    </div>
  </div>


  <div id="screen-score">
    
    <div class="score-header">
      <button class="back-btn" onclick="closeScoreScreen()">Cancel</button>
      <h3 style="margin: 0; font-family: 'Syne', sans-serif;">Hole <span id="score-hole-title">1</span></h3>
      <div style="width: 50px;"></div> </div>

    <div class="hole-indicator" id="hole-indicator-strip">
      </div>

    <div class="score-card-section">
      <div class="par-info" id="par-yardage-info">Par 4 | 340 Yds</div>

      <div class="entry-row">
        <div class="entry-label">Score</div>
        <div class="number-adjuster">
          <button class="adj-btn" onclick="adjustValue('score-val', -1)">-</button>
          <div class="num-display" id="score-val">0</div>
          <button class="adj-btn" onclick="adjustValue('score-val', 1)">+</button>
        </div>
      </div>

      <div class="entry-row">
        <div class="entry-label">Putts</div>
        <div class="number-adjuster">
          <button class="adj-btn" onclick="adjustValue('putts-val', -1)">-</button>
          <div class="num-display" id="putts-val">0</div>
          <button class="adj-btn" onclick="adjustValue('putts-val', 1)">+</button>
        </div>
      </div>

      <div class="entry-row" style="flex-direction: column; align-items: flex-start;">
        <div class="entry-label" style="margin-bottom: 15px;">Drive Accuracy</div>
        <div class="segment-group" style="width: 100%;">
          <button class="segment-btn drive-btn" onclick="selectDrive('left', this)">◂ Left</button>
          <button class="segment-btn drive-btn" onclick="selectDrive('hit', this)">Fairway</button>
          <button class="segment-btn drive-btn" onclick="selectDrive('right', this)">Right ▸</button>
        </div>
      </div>

      <div class="entry-row" style="flex-direction: column; align-items: flex-start; border-bottom: none;">
        <div class="entry-label" style="margin-bottom: 15px;">Green in Regulation</div>
        <div class="segment-group" style="width: 100%;">
          <button class="segment-btn gir-btn" onclick="selectGIR(false, this)">Missed</button>
          <button class="segment-btn gir-btn" onclick="selectGIR(true, this)">Hit</button>
        </div>
      </div>

    </div>

    <div class="bottom-bar">
      <button class="next-hole-btn" onclick="saveScoreAndNextHole()">NEXT HOLE</button>
    </div>

  </div>

  <script>
    // --- 1. SUPABASE SETUP ---
    const SUPABASE_URL = 'https://nawebecmrjoyuapwhuaq.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hd2ViZWNtcmpveXVhcHdodWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjY2NjEsImV4cCI6MjA5MDEwMjY2MX0.bKOoBYFDTEw0QYvFmoSuOjcqRioN44OkqgpLfX42sG0';
    let sb = null;
    try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch (err) { console.error(err); }

    // --- 2. COURSE DATA (MOCK PARS FOR FRONT 9) ---
    const courseData = {
      1: { par: 4, yards: 340 }, 2: { par: 4, yards: 390 }, 3: { par: 5, yards: 500 },
      4: { par: 3, yards: 160 }, 5: { par: 4, yards: 380 }, 6: { par: 4, yards: 410 },
      7: { par: 3, yards: 180 }, 8: { par: 5, yards: 520 }, 9: { par: 4, yards: 400 }
    };

    // --- 3. PANZOOM SETUP ---
    let panzoomInstance = null;
    function initPanzoom() {
      const zoomWrapper = document.getElementById('zoom-wrapper');
      panzoomInstance = Panzoom(zoomWrapper, { maxScale: 5, minScale: 1, contain: 'outside', step: 0.3 });
    }

    // --- 4. AUTHENTICATION ---
    let authMode = 'login'; 
    function switchAuthTab(mode) {
      authMode = mode;
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', mode === 'login');
      tabs[1].classList.toggle('active', mode === 'signup');
      document.getElementById('auth-submit').textContent = mode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN';
    }

    async function handleAuth() {
      const email = document.getElementById('field-email').value;
      const pass = document.getElementById('field-pass').value;
      const btn = document.getElementById('auth-submit');
      if (!email || !pass) return alert("Please enter email and password.");
      btn.textContent = 'LOADING…'; btn.disabled = true;

      try {
        if (authMode === 'signup') {
          const { error } = await sb.auth.signUp({ email, password: pass });
          if (error) throw error;
          alert("Account Created! Switch to LOGIN.");
          switchAuthTab('login');
        } else {
          const { error } = await sb.auth.signInWithPassword({ email, password: pass });
          if (error) throw error;
          document.getElementById('screen-auth').style.display = 'none';
          document.getElementById('screen-game').style.display = 'flex';
          initPanzoom(); loadHole(1);
        }
      } catch (err) { alert("Auth Error: " + err.message); }
      btn.textContent = authMode === 'signup' ? 'CREATE ACCOUNT' : 'LOGIN'; btn.disabled = false;
    }

    // --- 5. GAME / MAP STATE ---
    let currentHole = 1;
    const TOTAL_HOLES = 9; 
    let currentShots = []; 
    let activeShotType = 'Tee'; 

    function loadHole(holeNumber) {
      currentHole = holeNumber;
      document.getElementById('hole-title').textContent = `Hole ${holeNumber}`;
      document.getElementById('hole-image').src = `./images/Hole${holeNumber}.png`;
      document.getElementById('save-hole-btn').textContent = `Enter Hole ${holeNumber} Score`;
      
      currentShots = [];
      document.getElementById('average-display').textContent = "Awaiting Shot Plot...";
      document.querySelectorAll('.shot-pin').forEach(pin => pin.remove());
      if (panzoomInstance) panzoomInstance.reset();
      
      document.querySelectorAll('.shot-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.shot-btn')[0].classList.add('active');
      activeShotType = 'Tee';
    }

    function setShotType(type, buttonElement) {
      activeShotType = type;
      document.querySelectorAll('.shot-btn').forEach(btn => btn.classList.remove('active'));
      buttonElement.classList.add('active');
    }

    async function handleMapTap(event) {
      if (activeShotType === 'Tee' && currentShots.some(shot => shot.type === 'Tee')) {
        return alert("You have already plotted a Tee shot. Switch to Approach, Chip, or Putt.");
      }
      const wrapper = document.getElementById('zoom-wrapper');
      const rect = wrapper.getBoundingClientRect();
      const pctX = ((event.clientX - rect.left) / rect.width) * 100;
      const pctY = ((event.clientY - rect.top) / rect.height) * 100;

      const pin = document.createElement('div');
      pin.className = `shot-pin pin-${activeShotType}`;
      pin.style.left = `${pctX}%`; pin.style.top = `${pctY}%`;
      wrapper.appendChild(pin);

      currentShots.push({ type: activeShotType, x: pctX, y: pctY, timestamp: new Date().toISOString() });
      document.getElementById('average-display').textContent = "Calculating...";
      
      // Calculate Average (Mocked DB Call for brevity in logic view)
      document.getElementById('average-display').textContent = `Plot saved! Total Shots: ${currentShots.length}`;
    }

    // --- 6. GHIN-STYLE SCORE ENTRY LOGIC ---
    let driveState = null; // 'left', 'hit', 'right'
    let girState = null;   // true, false

    function renderHoleStrip() {
      const strip = document.getElementById('hole-indicator-strip');
      strip.innerHTML = '';
      for(let i=1; i<=TOTAL_HOLES; i++) {
        const circle = document.createElement('div');
        circle.className = `hole-circle ${i === currentHole ? 'active' : ''}`;
        circle.textContent = i;
        strip.appendChild(circle);
      }
    }

    function openScoreScreen() {
      // 1. Setup UI Text
      document.getElementById('score-hole-title').textContent = currentHole;
      const holeInfo = courseData[currentHole] || { par: 4, yards: 0 };
      document.getElementById('par-yardage-info').textContent = `Par ${holeInfo.par} | ${holeInfo.yards} Yds`;
      renderHoleStrip();

      // 2. SMART PRE-FILL LOGIC
      // Score = Total physical plots placed on the map
      const totalScore = currentShots.length > 0 ? currentShots.length : holeInfo.par;
      // Putts = Total plots marked specifically as 'Putt'
      const totalPutts = currentShots.filter(s => s.type === 'Putt').length;

      document.getElementById('score-val').textContent = totalScore;
      document.getElementById('putts-val').textContent = totalPutts;

      // 3. Reset manual toggles
      driveState = null; girState = null;
      document.querySelectorAll('.drive-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.gir-btn').forEach(btn => btn.classList.remove('active-green'));

      // 4. Swap Screens
      document.getElementById('screen-game').style.display = 'none';
      document.getElementById('screen-score').style.display = 'flex';
    }

    function closeScoreScreen() {
      document.getElementById('screen-score').style.display = 'none';
      document.getElementById('screen-game').style.display = 'flex';
    }

    // Math functions for the +/- buttons
    function adjustValue(elementId, change) {
      const el = document.getElementById(elementId);
      let val = parseInt(el.textContent) + change;
      if (val < 0) val = 0;
      el.textContent = val;
    }

    // Toggle logic for Drive and GIR
    function selectDrive(state, btnElement) {
      driveState = state;
      document.querySelectorAll('.drive-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
    }
    function selectGIR(state, btnElement) {
      girState = state;
      document.querySelectorAll('.gir-btn').forEach(btn => btn.classList.remove('active-green'));
      btnElement.classList.add('active-green');
    }

    async function saveScoreAndNextHole() {
      const score = parseInt(document.getElementById('score-val').textContent);
      const putts = parseInt(document.getElementById('putts-val').textContent);

      // (Optional: Add actual Supabase DB saving here using sb.from('rounds').insert(...))

      // Move to Next Hole!
      closeScoreScreen();
      
      if (currentHole < TOTAL_HOLES) {
        loadHole(currentHole + 1);
      } else {
        alert("Front 9 Complete! Great round.");
        loadHole(1); // loop back or redirect to a summary page later
      }
    }

  </script>
</body>
</html>
